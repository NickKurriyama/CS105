<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style/main.css" rel="stylesheet" type="text/css">
</head>
<body>
    <div class = "container">
        <h1 class = "title"> LAB 3 - VÕ TẠ HỮU HUY - 23520655</h1>
        <select id = "Fractal">
            <option value = "Snowflake"> SnowFlake </option>
            <option value = "Minskowki"> Minskowki </option>
        </select>
        <canvas id="webglcanvas" width="500" height="500"></canvas>
        <div id="levelDisplay">
        Level: <span id="levelValue">0</span>
        </div>
        <script>
            let script;
            document.getElementById("Fractal").addEventListener("change", function() {
                if (script) 
                {
                    document.body.removeChild(script);
                    script = null;
                }

                const canvas = document.getElementById("webglcanvas");
                const gl = canvas.getContext("webgl");
                gl.clearColor(1, 1, 1, 1);
                gl.clear(gl.COLOR_BUFFER_BIT);

                document.getElementById("levelValue").textContent = 0;

                script = document.createElement("script");
                script.src = "src/" + this.value + ".js";
                document.body.appendChild(script);
            });
            document.getElementById("Fractal").dispatchEvent(new Event("change"));
        </script>
</body>
</html>
